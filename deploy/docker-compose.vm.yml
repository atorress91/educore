# Compose que corre EN LA VM. El backend NO publica puertos al host:
# solo es accesible por la red interna; Caddy expone 80/443 y hace de proxy.
services:
  backend:
    image: educore-backend:latest
    container_name: educore-backend
    restart: unless-stopped
    env_file: /opt/educore/.env
    environment:
      # Origen(es) permitidos por CORS. Debe incluir el dominio del frontend
      # desplegado; separar por comas si hay más de uno. Sobreescribe el
      # default de dev (http://localhost:3000).
      EDUCORE_CORS_ALLOWED_ORIGINS: https://34-45-175-192.sslip.io
    networks: [educore-net]
    mem_limit: 768m
    memswap_limit: 2g

  caddy:
    image: caddy:2-alpine
    container_name: educore-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/educore/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [educore-net]
    depends_on: [backend]

networks:
  educore-net:

volumes:
  caddy_data:
  caddy_config:
