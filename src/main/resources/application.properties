spring.application.name=EduCore

# ── H2 in-memory (development) ──────────────────────────────
spring.datasource.url=jdbc:h2:mem:educore
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT (override EDUCORE_JWT_SECRET in production; default is dev-only)
educore.jwt.secret=${EDUCORE_JWT_SECRET:ZWR1Y29yZS1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudC1vbmx5LWNoYW5nZS1pbi1wcm9kdWN0aW9u}
educore.jwt.expiration-ms=${EDUCORE_JWT_EXPIRATION_MS:86400000}

# GraphQL
spring.graphql.graphiql.enabled=true
